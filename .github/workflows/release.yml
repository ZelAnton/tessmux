name: Release

# Manual release workflow. Needs the `CRATES_IO_TOKEN` repository secret to
# publish to crates.io.
#
# Shipped ENABLED: it is `workflow_dispatch`-only with no `push:`/tag trigger, so
# it never runs on its own — you click "Run workflow" in the Actions UI and pick
# a bump type. The version number is never typed by hand: pick patch/minor/major
# and the source-of-truth (`Cargo.toml`) drives everything, then gets committed
# back so the manifest, the git tag, and the GitHub Release never drift apart.
# The first release (no `v*` tag yet) ships the current `Cargo.toml` version
# as-is, ignoring the bump.
#
# Single-crate release: bump the version, auto-fill an empty `[Unreleased]` from
# git history via git-cliff, promote the curated changelog, verify the crate
# publishes (dry run), publish to crates.io, then tag `v<version>` and publish a
# GitHub Release. Publishing comes BEFORE the tag, so a failed publish strands
# nothing (just re-run). See AGENTS.md "Releasing and the changelog". For a
# workspace of several independently-versioned crates, model
# this on vcs-toolkit-rs's release.yml instead (per-crate `crate`/`version`
# inputs and `<crate>-v<version>` tags).

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type (ignored on the first release)
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

# Never run two releases at once — they both bump + commit to the branch.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # push the version-bump commit + tag, and create the Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # GUARD: tessmux is in its PoC phase — the workspace is a virtual
      # manifest whose only member is `publish = false`. Without this guard a
      # dispatch would "succeed" as a phantom release: the version grep below
      # matches [workspace.package], `cargo publish` exits 0 with "nothing to
      # publish", and the workflow would tag + GitHub-Release with nothing on
      # crates.io. Remove this step (and adapt the workflow per the workspace
      # note above) when the first publishable crate (crates/pty, roadmap §9)
      # exists.
      - name: Refuse to release a PoC-phase workspace
        run: |
          echo "::error::tessmux has no publishable crates yet (PoC phase); releases are disabled. See the guard step in release.yml."
          exit 1
      # Mint a short-lived GitHub App installation token. Pushing the release commit
      # to `main` with it makes the **App** the actor — and the App sits in the
      # branch-protection ruleset's bypass list, so the push is allowed. The default
      # `github-actions[bot]` CANNOT be granted a ruleset bypass (it's a system actor,
      # not an App), and a PAT would expire; an App token is short-lived, auto-revoked,
      # and needs no rotation. Configure repo variable `RELEASE_APP_ID` + secret
      # `RELEASE_APP_PRIVATE_KEY`; until then this step is skipped and the push falls
      # back to the default `GITHUB_TOKEN` (fine while `main` is unprotected). See the
      # release-token-bypass.md recipe.
      - name: Mint GitHub App token
        id: app-token
        if: ${{ vars.RELEASE_APP_ID != '' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history + tags, for version math and git-cliff
          # Persist the App token so the later `git push` to `main` runs as the App
          # (and thus uses its ruleset bypass). Empty when the App isn't configured →
          # fall back to the default token.
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      # We always release from `main`. workflow_dispatch still lets you pick any
      # ref in the "Use workflow from" dropdown, so reject anything else up front
      # rather than silently bumping + tagging some other branch.
      - name: Require main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::Releases must run from main (got '${{ github.ref }}'). Re-run with 'Use workflow from: main'."
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable # rolling toolchain selector — intentionally unpinned

      # Fail fast (in seconds) if the publish credential is missing — before the
      # slow build / version bump / changelog work — and with a clear message
      # instead of cargo's opaque auth error. (Publishing now precedes the tag,
      # so a missing token can no longer strand a tag; this is purely about
      # failing early and legibly.)
      - name: Preflight — require CRATES_IO_TOKEN
        env:
          TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [ -z "${TOKEN}" ]; then
            echo "::error::CRATES_IO_TOKEN secret is not set. Add it under repo Settings → Secrets and variables → Actions before releasing."
            exit 1
          fi

      - name: Install tooling
        run: cargo install cargo-edit --locked

      - name: Install git-cliff
        uses: taiki-e/install-action@25435dc8dd3baed7417e0c96d3fe89013a5b2e09 # v2
        with:
          tool: git-cliff@2

      # Compute the next version from Cargo.toml — never typed by hand. `bump`
      # is a fixed choice (not free-form), so interpolating it into the script
      # is not a script-injection risk; the derived outputs are passed to later
      # steps through `env:` rather than re-interpolated.
      - name: Determine version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          CURRENT=$(grep -m1 -oP '(?<=^version = ")[^"]+' Cargo.toml)
          if [[ ! "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Could not parse version from Cargo.toml (got '$CURRENT')"
            exit 1
          fi
          if git tag --list 'v*' | grep -q .; then
            # A prior release exists: apply the chosen bump.
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            case "${{ inputs.bump }}" in
              major) NEW="$((MAJOR+1)).0.0" ;;
              minor) NEW="${MAJOR}.$((MINOR+1)).0" ;;
              patch) NEW="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
            esac
            PREV="v$CURRENT"
          else
            # First release: ship the current Cargo.toml version as-is.
            NEW="$CURRENT"
            PREV=""
          fi
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"
          echo "prev_tag=$PREV" >> "$GITHUB_OUTPUT"
          echo "Releasing v$NEW (previous: ${PREV:-none})"

      - name: Verify tag does not exist
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists"
            exit 1
          fi

      # No-op on the first release (already at the current version).
      - name: Bump version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: cargo set-version "$VERSION"

      # Manual bullets always win. Only when [Unreleased] has no real bullets do
      # we fill it from commit subjects since the previous tag (or full history
      # on the first release), using cliff.toml's prefix→section rules.
      - name: Auto-fill empty [Unreleased] from git log
        env:
          PREV_TAG: ${{ steps.version.outputs.prev_tag }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          import pathlib
          import re
          import subprocess
          import sys

          prev_tag = os.environ.get("PREV_TAG", "")
          path = pathlib.Path("CHANGELOG.md")
          text = path.read_text()

          # Capture the [Unreleased] body up to the next version section, the
          # reference-link block (`[Unreleased]: ...` / `[x.y.z]: ...`), or EOF.
          # The link-block stop matters on a first release, where [Unreleased]
          # is the last `##` section and the capture would otherwise swallow
          # (and this step would then delete) the trailing link definitions.
          m = re.search(r"^## \[Unreleased\]\s*\n(.*?)(?=^## \[|^\[[^\]]+\]:|\Z)", text, re.M | re.S)
          if not m:
              print("::error::Could not find '## [Unreleased]' header in CHANGELOG.md", file=sys.stderr)
              sys.exit(1)

          body = m.group(1)
          has_real_bullets = any(re.match(r"^-\s+\S", ln) for ln in body.splitlines())
          if has_real_bullets:
              print("[Unreleased] already has manual entries; skipping auto-fill.")
              sys.exit(0)

          tag_exists = bool(prev_tag) and subprocess.run(
              ["git", "rev-parse", "--verify", prev_tag], capture_output=True
          ).returncode == 0

          if tag_exists:
              print(f"[Unreleased] is empty; generating from git log since {prev_tag}...")
              cliff_cmd = ["git-cliff", "--config", "cliff.toml", "--strip", "all", f"{prev_tag}..HEAD"]
          else:
              print("[Unreleased] is empty; generating from full git history...")
              cliff_cmd = ["git-cliff", "--config", "cliff.toml", "--strip", "all"]
          empty_hint = (
              "::error::No release-worthy commits found. Either add a manual entry to "
              "[Unreleased] in CHANGELOG.md, or commit changes with a recognised prefix "
              "(feat/fix/perf/ux/refactor/remove/...)."
          )

          result = subprocess.run(cliff_cmd, capture_output=True, text=True)
          if result.returncode != 0:
              # git-cliff itself failed (bad config, bad range, ...). Surface its
              # stderr rather than a Python traceback or the misleading
              # "no commits" hint below.
              print(f"::error::git-cliff failed: {result.stderr.strip()}", file=sys.stderr)
              sys.exit(1)
          generated = result.stdout.strip()
          if not generated:
              print(empty_hint, file=sys.stderr)
              sys.exit(1)

          new_text = text[: m.start(1)] + generated + "\n\n" + text[m.end(1) :]
          path.write_text(new_text)
          print("----- auto-generated [Unreleased] body -----")
          print(generated)
          print("--------------------------------------------")
          PY

      # Curate release notes from [Unreleased]: keep only "### Header" sections
      # that have at least one real bullet, dropping placeholder "-" lines.
      # Written OUTSIDE the working tree ($RUNNER_TEMP) so it neither dirties the
      # tree (which would abort `cargo publish`) nor lands in the packaged crate.
      - name: Extract release notes
        env:
          NOTES_FILE: ${{ runner.temp }}/release-notes.md
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          import pathlib
          import re
          import sys

          text = pathlib.Path("CHANGELOG.md").read_text()
          # Bound the body by the next version section, the reference-link block,
          # or EOF (see the auto-fill step for why the link-block stop matters).
          m = re.search(r"^## \[Unreleased\]\s*\n(.*?)(?=^## \[|^\[[^\]]+\]:|\Z)", text, re.M | re.S)
          body = (m.group(1) if m else "").strip()

          parts = re.split(r"(?m)(^### .+$)", body)
          out = []
          for i in range(1, len(parts), 2):
              header = parts[i]
              section = parts[i + 1] if i + 1 < len(parts) else ""
              bullets = [ln for ln in section.splitlines() if re.match(r"^-\s+\S", ln)]
              if bullets:
                  if out:
                      out.append("")
                  out.append(header)
                  out.extend(bullets)

          result = "\n".join(out).strip()
          if not result:
              print(
                  "::error::[Unreleased] section in CHANGELOG.md is empty. "
                  "Add release notes before releasing.",
                  file=sys.stderr,
              )
              sys.exit(1)

          pathlib.Path(os.environ["NOTES_FILE"]).write_text(result + "\n")
          print("----- release notes -----")
          print(result)
          print("-------------------------")
          PY

      # Rename the curated `## [Unreleased]` heading to the new version + date,
      # leave a fresh empty Unreleased above it, and rewrite the reference links.
      # On the first release (no previous tag) the new-version link points at the
      # tag page; otherwise it's a compare link against the previous tag.
      - name: Promote [Unreleased] in CHANGELOG.md
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          PREV_TAG: ${{ steps.version.outputs.prev_tag }}
          REPO: ${{ github.server_url }}/${{ github.repository }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          import pathlib
          import re
          import sys
          from datetime import datetime, timezone

          version = os.environ["VERSION"]
          tag = os.environ["TAG"]
          prev_tag = os.environ.get("PREV_TAG", "")
          repo = os.environ["REPO"]
          date = datetime.now(timezone.utc).strftime("%Y-%m-%d")

          path = pathlib.Path("CHANGELOG.md")
          text = path.read_text()

          new_unreleased = (
              "## [Unreleased]\n\n"
              "### Added\n-\n\n"
              "### Changed\n-\n\n"
              "### Fixed\n-\n\n"
              f"## [{version}] - {date}"
          )
          text, n = re.subn(r"^## \[Unreleased\][ \t]*$", new_unreleased, text, count=1, flags=re.M)
          if n != 1:
              print("::error::Could not find '## [Unreleased]' header in CHANGELOG.md", file=sys.stderr)
              sys.exit(1)

          if prev_tag:
              version_link = f"[{version}]: {repo}/compare/{prev_tag}...{tag}"
          else:
              version_link = f"[{version}]: {repo}/releases/tag/{tag}"
          link_replacement = f"[Unreleased]: {repo}/compare/{tag}...HEAD\n{version_link}"
          text, n = re.subn(r"^\[Unreleased\]:.*$", link_replacement, text, count=1, flags=re.M)
          if n != 1:
              print("::error::Could not find '[Unreleased]: ...' reference link in CHANGELOG.md", file=sys.stderr)
              sys.exit(1)

          path.write_text(text)
          print(f"Promoted [Unreleased] -> [{version}] - {date}")
          PY

      # Commit the bump + changelog locally (NOT pushed yet) so the next step can
      # verify against a clean tree, and the tag — once created — points at it.
      - name: Commit version bump + changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name  "Anton Zhelezniakou"
          git config user.email "github@zelanton.net"
          # Stage exactly the release artifacts. (release-notes.md lives in
          # $RUNNER_TEMP, outside the tree, so it is never a candidate here.)
          git add Cargo.toml Cargo.lock CHANGELOG.md
          git commit -m "Release v${VERSION}"

      # Gate: build + package the crate exactly as `cargo publish` would, but
      # without uploading — catches build/packaging/metadata errors cleanly,
      # before the irreversible publish below consumes a real attempt. No token
      # needed for a dry run; release-notes.md is outside the tree so it is not
      # packaged.
      - name: Verify the crate publishes (dry run)
        # `--locked` asserts Cargo.lock matches the (just-bumped) manifest, so
        # the dry run can't silently re-resolve / rewrite the lockfile and dirty
        # the tree (which would then make the real publish below fail its
        # clean-tree check). cargo set-version already updated the lock.
        run: cargo publish --locked --dry-run

      # Publish FIRST — before the tag/push/Release. crates.io is the only
      # irreversible step (a version can never be re-published), so doing it
      # before anything is pushed means a failed publish leaves NO stranded tag:
      # you just re-run. Retry to ride out transient registry/network errors; an
      # "already uploaded" result (a prior run that published but failed before
      # tagging) counts as success, so the re-run proceeds to tag + Release.
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -uo pipefail
          attempt=0
          max=3
          while :; do
            attempt=$((attempt + 1))
            if out="$(cargo publish --locked 2>&1)"; then
              printf '%s\n' "$out"
              break
            fi
            printf '%s\n' "$out"
            # Treat "this exact version is already published" as success (a prior
            # run that uploaded but failed before tagging). Match cargo's actual
            # phrasings specifically — a broad "already exists" would risk a false
            # positive that tags an unpublished version.
            if printf '%s' "$out" | grep -qiE 'crate version .* is already uploaded|already exists on [^[:space:]]*crates\.io index'; then
              echo "::notice::This version is already on crates.io — treating as published."
              break
            fi
            if [ "$attempt" -ge "$max" ]; then
              echo "::error::cargo publish failed after ${max} attempts."
              exit 1
            fi
            echo "::warning::cargo publish attempt ${attempt} failed; retrying in 30s..."
            sleep 30
          done

      # Only after the crate is live on crates.io: tag the release and push the
      # commit + tag atomically (if either ref is rejected, neither lands). A
      # non-atomic push that advanced the branch but dropped the tag would make
      # the next run bump from the already-bumped version and skip a release
      # number. actions/checkout leaves a detached HEAD, so the branch is named
      # explicitly (`git push origin HEAD` can't resolve a branch when detached).
      # We always release from main (enforced by the "Require main" step above).
      - name: Tag and push
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git tag "v${VERSION}"
          git push --atomic origin "HEAD:refs/heads/main" "refs/tags/v${VERSION}"

      # The tag now exists; attach the Release to it using the curated notes from
      # $RUNNER_TEMP. gh is pre-installed on ubuntu-latest. This runs AFTER the
      # crate is published and the tag pushed, so it must not be the step that
      # fails the release: it is idempotent (edit if a prior attempt created it)
      # and retried. If it still fails, the error tells you to finish by hand and
      # NOT to re-run — a re-run would read the already-bumped version from main
      # and ship the next version, stranding this one's Release.
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          NOTES_FILE: ${{ runner.temp }}/release-notes.md
        run: |
          set -uo pipefail
          attempt=0
          max=3
          while :; do
            attempt=$((attempt + 1))
            if gh release view "$TAG" >/dev/null 2>&1; then
              gh release edit "$TAG" --title "$TAG" --notes-file "$NOTES_FILE" && break
            else
              gh release create "$TAG" --title "$TAG" --notes-file "$NOTES_FILE" && break
            fi
            if [ "$attempt" -ge "$max" ]; then
              echo "::error::${TAG} is PUBLISHED to crates.io and the tag is pushed, but creating the GitHub Release failed. Finish it by hand: gh release create ${TAG} --notes-file <notes>. Do NOT re-run this workflow — it would bump to the next version and strand ${TAG}'s release."
              exit 1
            fi
            echo "::warning::GitHub Release attempt ${attempt} failed; retrying in 15s..."
            sleep 15
          done
