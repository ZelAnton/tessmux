# cargo-deny configuration. CI runs `cargo deny check advisories bans`
# (see .github/workflows/ci.yml). Licenses/sources are not gated for now.

[advisories]
# Fail on crates with a RustSec security advisory or that have been yanked.
version = 2
yanked = "deny"
ignore = [
	# `serial` is unmaintained (notice, not a vulnerability). portable-pty 0.8
	# pulls it unconditionally for its serial-port domain, which tessmux never
	# uses (we only open local ConPTY/openpty sessions). Drop this when
	# portable-pty makes serial optional or we vendor a slimmer backend.
	"RUSTSEC-2017-0008",
]

[bans]
# Duplicate versions of the same crate are a warning, not a hard failure.
multiple-versions = "warn"
# Wildcard version requirements hide breakage; flag them.
wildcards = "deny"
# Version-less path dependencies between our own workspace crates are fine —
# everything here is publish = false, so a registry version is meaningless.
allow-wildcard-paths = true
